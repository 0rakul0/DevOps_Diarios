nomeTRT:
  nome: "TRF3_PJE"

urls:
  consulta_url: "https://pje1g.trf3.jus.br/pje/ConsultaPublica/listView.seam"

http:
  timeout: 10
  headers:
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36"
    Accept: "application/json, text/javascript, */*; q=0.01"
    X-Requested-With: "XMLHttpRequest"

logs:
  log_file: "logs/log_robo_pje.txt"
  error_file: "logs/erro_robo_pje.txt"

captcha:
  min_wait_time: 5

etapas:
  - descricao: "Baixar os diários oficiais por caderno e data"
    metodo: "consulta"
    parametros: {}

  - descricao: "entrar com cpf ou cnpj"
    metodo: "get_cpf"
    parametros:
      driver: "Driver Selenium configurado"

  - descricao: "Salvar os links das certidoes válida"
    metodo: "salva_links"
